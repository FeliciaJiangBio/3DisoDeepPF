name: 3disodeeppf
channels:
  - pytorch
  - pyg
  - conda-forge
  - defaults
dependencies:
  # Core Python
  - python>=3.8
  - pip>=21.0

  # PyTorch
  - pytorch>=2.0.0
  - torchvision
  - torchaudio

  # Graph neural networks
  - pyg>=2.3.0
  - torch-scatter
  - torch-sparse
  - torch-cluster
  - torch-spline-conv

  # Data science
  - numpy>=1.21.0
  - pandas>=1.3.0
  - scikit-learn>=1.0.0
  - scipy>=1.7.0

  # Bioinformatics
  - biopython>=1.79

  # Visualization
  - matplotlib>=3.5.0
  - seaborn>=0.11.0

  # Utilities
  - tqdm>=4.62.0
  - pyyaml>=6.0
  - ipython

  # Optional: GPU加速 (CUDA 11.7)
  - cudatoolkit=11.7
  - cudnn

  # Development
  - jupyter
  - notebook
  - black
  - isort
  - flake8
  - mypy

variables:
  PYTHONPATH: "${CONDA_PREFIX}/lib/python3.8/site-packages"
  OMP_NUM_THREADS: "4"
  MKL_NUM_THREADS: "4"
